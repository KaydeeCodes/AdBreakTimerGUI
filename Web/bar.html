<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ad Break Bar</title>
    <!-- Bottom progress bar overlay. Made by Kaydee.Codes (https://kaydee.codes/), free to use, no data collected, ever. -->
    <!-- I poll /bar/api?cmd=status 5x/sec and redraw from whatever comes back, no state kept here, so OBS can load/unload this browser source at any point and it just picks up wherever the timer is. -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        #track {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
        }

        #fill {
            position: absolute;
            left: 0;
            bottom: 0;
            top: 0;
            width: 0%;
            transition: width 0.25s linear, background-color 0.3s ease;
        }

        #fill.pulse {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
    </style>
</head>
<body>
<div id="track">
    <div id="fill"></div>
</div>

<script>
    const API = "/bar/api";

    const trackEl = document.getElementById('track');
    const fillEl = document.getElementById('fill');

    function render(state) {
        trackEl.style.height = state.barHeight + 'px';

        document.body.style.background = state.bgColor === 'transparent' ? 'transparent' : state.bgColor;

        const initial = state.initialTime > 0 ? state.initialTime : 1;
        const elapsedPct = Math.min(100, Math.max(0, ((initial - state.remaining) / initial) * 100));

        let pct;
        if (state.status === 'finished') {
            pct = 100; // snapped full so the finish colour is visible regardless of direction, actual visibility handled below by finishStyle
        } else if (state.status === 'idle') {
            pct = 0;
        } else {
            pct = state.direction === 'fill' ? elapsedPct : (100 - elapsedPct);
        }

        const color = state.status === 'finished' ? state.finishColor : state.color;
        fillEl.style.backgroundColor = color;

        // finishStyle: "flash" pulses (old default), "static" holds solid, "hidden" disappears entirely, all three last exactly flashDuration seconds either way, Tick() on the server doesn't know or care which one's chosen, this is purely how it's drawn.
        if (state.status === 'finished' && state.finishStyle === 'hidden') {
            fillEl.style.width = '0%';
            fillEl.classList.remove('pulse');
        } else if (state.status === 'finished' && state.finishStyle === 'flash') {
            fillEl.style.width = pct + '%';
            fillEl.classList.add('pulse');
        } else {
            fillEl.style.width = pct + '%';
            fillEl.classList.remove('pulse');
        }
    }

    async function poll() {
        try {
            const res = await fetch(API + '?cmd=status', { cache: 'no-store' });
            const data = await res.json();
            if (data.ok) render(data.state);
        } catch (e) {
            // Server's probably not up yet or restarted, just retry next tick
        }
        setTimeout(poll, 200);
    }

    poll();
</script>
</body>
</html>
