<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ad Break Bar</title>
    <!-- Bottom progress bar overlay. Made by Kaydee.Codes (https://kaydee.codes/), free to use, no data collected, ever. -->
    <!-- I poll /bar/api?cmd=status 5x/sec and redraw from whatever comes back, no state kept here, so OBS can load/unload this at any point and it just picks up wherever the timer is. -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        /* Pinned to the bottom of whatever size OBS gives this, no fixed canvas size on purpose */
        #track {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
        }

        #fill {
            position: absolute;
            left: 0;
            bottom: 0;
            top: 0;
            width: 0%;
            transition: width 0.25s linear, background-color 0.3s ease;
        }

        #fill.pulse {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
    </style>
</head>
<body>
<div id="track">
    <div id="fill"></div>
</div>

<script>
    const API = "/bar/api";

    // Cached once rather than re-queried every render, this runs 5x/sec for as long as the overlay's open.
    const trackEl = document.getElementById('track');
    const fillEl = document.getElementById('fill');

    function render(state) {
        trackEl.style.height = state.barHeight + 'px';

        document.body.style.background = state.bgColor === 'transparent' ? 'transparent' : state.bgColor;

        // % of the countdown elapsed so far
        const initial = state.initialTime > 0 ? state.initialTime : 1;
        const elapsedPct = Math.min(100, Math.max(0, ((initial - state.remaining) / initial) * 100));

        let pct;
        if (state.status === 'finished') {
            // Snap to full width so the finish colour flash is actually visible regardless of direction
            pct = 100;
        } else if (state.status === 'idle') {
            pct = 0;
        } else {
            // drain starts full and shrinks, fill starts empty and grows
            pct = state.direction === 'fill' ? elapsedPct : (100 - elapsedPct);
        }

        fillEl.style.width = pct + '%';

        const color = state.status === 'finished' ? state.finishColor : state.color;
        fillEl.style.backgroundColor = color;

        fillEl.classList.toggle('pulse', state.status === 'finished' && state.flashOnFinish);
    }

    async function poll() {
        try {
            const res = await fetch(API + '?cmd=status', { cache: 'no-store' });
            const data = await res.json();
            if (data.ok) render(data.state);
        } catch (e) {
            // Server's probably not up yet or restarted, just retry next tick
        }
        setTimeout(poll, 200);
    }

    poll();
</script>
</body>
</html>
