<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ad Break Radial</title>
    <!-- Circular ring overlay. Made by Kaydee.Codes (https://kaydee.codes/), free to use, no data collected, ever. -->
    <!-- Same polling model as the bar: /radial/api?cmd=status 5x/sec. -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ring {
            transition: stroke-dashoffset 0.25s linear, stroke 0.3s ease;
        }

        #ring.pulse {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
    </style>
</head>
<body>
<svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <circle id="track" fill="none" />
    <circle id="ring" fill="none" stroke-linecap="butt" />
</svg>

<script>
    const API = "/radial/api";
    let lastState = null;

    // Cached once rather than re-queried every render, this runs 5x/sec for as long as the overlay's open.
    const svgEl = document.getElementById('svg');
    const trackEl = document.getElementById('track');
    const ringEl = document.getElementById('ring');

    // Diameter as a % of whichever viewport side is smaller, recalculated every render so the ring actually resizes with the OBS source
    function computeDiameter(sizePercent) {
        const vmin = Math.min(window.innerWidth, window.innerHeight);
        return Math.max(20, vmin * (sizePercent / 100));
    }

    function render(state) {
        lastState = state;

        const diameter = computeDiameter(state.size);
        const thickness = Math.max(1, diameter * (state.thickness / 100));
        const radius = (diameter / 2) - (thickness / 2);
        const circumference = 2 * Math.PI * radius;
        const center = diameter / 2;

        svgEl.setAttribute('width', diameter);
        svgEl.setAttribute('height', diameter);
        svgEl.setAttribute('viewBox', `0 0 ${diameter} ${diameter}`);

        document.body.style.background = state.bgColor === 'transparent' ? 'transparent' : state.bgColor;

        for (const circle of [trackEl, ringEl]) {
            circle.setAttribute('cx', center);
            circle.setAttribute('cy', center);
            circle.setAttribute('r', radius);
            circle.setAttribute('stroke-width', thickness);
        }

        trackEl.setAttribute('stroke', state.trackColor || 'rgba(255,255,255,0.15)');
        ringEl.setAttribute('stroke-dasharray', circumference);

        const initial = state.initialTime > 0 ? state.initialTime : 1;
        const elapsedPct = Math.min(1, Math.max(0, (initial - state.remaining) / initial));

        let drawnFraction;
        if (state.status === 'finished') {
            drawnFraction = 1; // fully drawn so the finish colour flash is visible
        } else if (state.status === 'idle') {
            drawnFraction = 0;
        } else {
            drawnFraction = 1 - elapsedPct;
        }
        ringEl.setAttribute('stroke-dashoffset', circumference * (1 - drawnFraction));

        // Rotates to start at 12 o'clock plus rotationDegrees, mirror flips cw/ccw.
        // Mirror is on 'cw' not 'ccw' here, SVG draws clockwise by default so that looked backwards until testing showed it needed swapping, see project notes for why.
        const mirror = state.direction === 'cw' ? 'scale(-1,1)' : '';
        const rotationOffset = Number(state.rotationDegrees) || 0;
        ringEl.setAttribute('transform', `translate(${center},${center}) rotate(${-90 + rotationOffset}) ${mirror} translate(${-center},${-center})`);

        const color = state.status === 'finished' ? state.finishColor : state.color;
        ringEl.setAttribute('stroke', color);

        ringEl.classList.toggle('pulse', state.status === 'finished' && state.flashOnFinish);
    }

    window.addEventListener('resize', () => {
        if (lastState) render(lastState);
    });

    async function poll() {
        try {
            const res = await fetch(API + '?cmd=status', { cache: 'no-store' });
            const data = await res.json();
            if (data.ok) render(data.state);
        } catch (e) {
            // Server's probably not up yet or restarted, just retry next tick
        }
        setTimeout(poll, 200);
    }

    poll();
</script>
</body>
</html>
